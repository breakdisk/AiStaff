# ── Shared build helper ───────────────────────────────────────────────────────
# All Rust services use the single workspace Dockerfile.
# Set `SERVICE` build arg to the cargo crate binary name (underscored).
x-rust-build: &rust-build
  context: .
  dockerfile: Dockerfile

# ── Shared service defaults ──────────────────────────────────────────────────
x-rust-defaults: &rust-defaults
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"   # rotate after 10 MB
      max-file: "3"     # keep 3 rotated files max (30 MB total per service)

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aistaff}
      POSTGRES_USER:     ${POSTGRES_USER:-aistaff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    command: >
      postgres
        -c shared_buffers=128MB
        -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aistaff} -d ${POSTGRES_DB:-aistaff}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/2181' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on:
      zookeeper: { condition: service_healthy }
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s

  # Pre-creates all Kafka topics so services start cleanly without
  # UnknownTopicOrPartition errors. Exits 0 after creation — not a long-lived service.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka: { condition: service_healthy }
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic installation.events    --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic escrow.commands        --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic deployment.status      --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic deployment.started     --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic deployment.complete    --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payout.veto            --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic biometric.signoff      --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic license.commands       --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic checklist.events       --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic warranty.events        --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic match.requests         --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic match.results          --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.fanout    --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic telemetry.events       --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic drift.alerts           --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trust.events           --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic reputation.commands    --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic collab.message_sent    --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.events       --partitions 1 --replication-factor 1
        echo "All Kafka topics created."
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Phase 1 services ───────────────────────────────────────────────────────
  identity-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: identity_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  marketplace-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: marketplace_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@aistaff.app}
      NOTIFICATION_SERVICE_URL: http://notification_service:3012
      RUST_LOG: info
    ports: ["3002:3002"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  checklist-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: checklist_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    ports: ["3003:3003"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  license-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: license_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    ports: ["3004:3004"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  matching-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: matching_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      COMPLIANCE_SERVICE_URL: http://compliance-service:3006
      RUST_LOG: info
    ports: ["3005:3005"]
    depends_on:
      postgres:           { condition: service_healthy }
      kafka:              { condition: service_healthy }
      compliance-service: { condition: service_started }

  compliance-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: compliance_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      RUST_LOG: info
    ports: ["3006:3006"]
    depends_on:
      postgres: { condition: service_healthy }

  telemetry-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: telemetry_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    ports: ["3007:3007"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  analytics-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: analytics_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      RUST_LOG: info
    ports: ["3008:3008"]
    depends_on:
      postgres: { condition: service_healthy }

  reputation-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: reputation_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      PLATFORM_DID: did:aistaff:platform
      RUST_LOG: info
    ports: ["3009:3009"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  payout-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: payout_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    ports: ["3010:3010"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  community-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: community_service }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    ports: ["3011:3011"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  # ── Kafka-only consumers (no HTTP port) ───────────────────────────────────
  deployment-engine:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: deployment_engine }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      MCP_SERVER_URL: http://mcp-server:4040
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RUST_LOG: info
    depends_on:
      postgres:   { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      mcp-server: { condition: service_started }

  environment-orchestrator:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: environment_orchestrator }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      RUST_LOG: info
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }

  notification-service:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: notification_service }
    ports: ["3012:3012"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      KAFKA_BROKERS: kafka:9092
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@aistaff.app}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      NOTIFICATION_HTTP_PORT: "3012"
      BASE_URL: ${BASE_URL:-http://localhost:3000/api}
      # Twilio (SMS + WhatsApp)
      TWILIO_ACCOUNT_SID:     ${TWILIO_ACCOUNT_SID:-dev_placeholder}
      TWILIO_AUTH_TOKEN:      ${TWILIO_AUTH_TOKEN:-dev_placeholder}
      TWILIO_FROM_NUMBER:     ${TWILIO_FROM_NUMBER:-+15550000000}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-+14155238886}
      # Firebase Cloud Messaging
      FCM_SERVER_KEY:         ${FCM_SERVER_KEY:-dev_placeholder}
      # Slack OAuth
      SLACK_CLIENT_ID:        ${SLACK_CLIENT_ID:-dev_placeholder}
      SLACK_CLIENT_SECRET:    ${SLACK_CLIENT_SECRET:-dev_placeholder}
      # Google Calendar OAuth
      GOOGLE_CLIENT_ID:       ${GOOGLE_CLIENT_ID:-dev_placeholder}
      GOOGLE_CLIENT_SECRET:   ${GOOGLE_CLIENT_SECRET:-dev_placeholder}
      # AES-256 key for encrypting OAuth tokens at rest (32-byte base64)
      INTEGRATION_TOKEN_ENCRYPTION_KEY: ${INTEGRATION_TOKEN_ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      RUST_LOG: info
    depends_on:
      postgres: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
      mailhog:  { condition: service_started }

  mcp-server:
    <<: *rust-defaults
    build:
      <<: *rust-build
      args: { SERVICE: mcp_server }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      MCP_FS_ROOT: /workspace
      RUST_LOG: info
    ports: ["4040:4040"]
    depends_on:
      postgres: { condition: service_healthy }

  # ── Frontend ────────────────────────────────────────────────────────────────
  web:
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    build:
      context: apps/web
      dockerfile: Dockerfile
      args:
        IDENTITY_SERVICE_URL:     http://identity-service:3001
        MARKETPLACE_SERVICE_URL:  http://marketplace-service:3002
        CHECKLIST_SERVICE_URL:    http://checklist-service:3003
        LICENSE_SERVICE_URL:      http://license-service:3004
        MATCHING_SERVICE_URL:     http://matching-service:3005
        COMPLIANCE_SERVICE_URL:   http://compliance-service:3006
        TELEMETRY_SERVICE_URL:    http://telemetry-service:3007
        ANALYTICS_SERVICE_URL:    http://analytics-service:3008
        REPUTATION_SERVICE_URL:   http://reputation-service:3009
        PAYOUT_SERVICE_URL:       http://payout-service:3010
        COMMUNITY_SERVICE_URL:    http://community-service:3011
        NOTIFICATION_SERVICE_URL: http://notification-service:3012
        # Stripe publishable key is NEXT_PUBLIC_* — must be a build arg so Next.js
        # bakes it into the client bundle at `next build` time.
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    environment:
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Auth.js v5 requires AUTH_SECRET (not NEXTAUTH_SECRET). Accept both.
      AUTH_SECRET:     ${AUTH_SECRET:-${NEXTAUTH_SECRET}}
      NEXTAUTH_URL:    ${NEXTAUTH_URL:-http://localhost:3000}
      # Auth.js v5: AUTH_URL is the canonical base — do NOT set AUTH_TRUST_HOST
      # alongside it. AUTH_TRUST_HOST overrides AUTH_URL using the request Host
      # header, producing a different redirect_uri than what OAuth apps expect.
      AUTH_URL:        ${AUTH_URL:-${NEXTAUTH_URL:-http://localhost:3000}}
      # OAuth providers
      GITHUB_CLIENT_ID:     ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      LINKEDIN_CLIENT_ID:     ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      # Anthropic — required for LangGraph routes (/api/pm-agent, /api/proposal-copilot)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Qdrant — local vector DB for plagiarism detection (CLAUDE.md §0: offline-first AI)
      QDRANT_URL: http://qdrant:6333
      # OpenAI embeddings — text-embedding-3-small for deliverable similarity vectors
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Stripe — runtime server-side secrets (never exposed to client bundle)
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET}
      # Network International (N-Genius Online) — runtime server-side secrets
      NETWORK_INTL_API_KEY:    ${NETWORK_INTL_API_KEY:-}
      NETWORK_INTL_OUTLET_REF: ${NETWORK_INTL_OUTLET_REF:-}
      # Sandbox: https://api-gateway.sandbox.ngenius-payments.com
      # Production: https://api-gateway.ngenius-payments.com
      NETWORK_INTL_API_BASE:   ${NETWORK_INTL_API_BASE:-https://api-gateway.sandbox.ngenius-payments.com}
      # Custom webhook auth header value — must match Header Value in N-Genius portal
      NETWORK_INTL_WEBHOOK_SECRET: ${NETWORK_INTL_WEBHOOK_SECRET:-}
      # SMTP — magic link email delivery (Amazon SES or any SMTP relay).
      # Same vars used by notification_service; must be forwarded explicitly here
      # because docker-compose environment: lists are not inherited across services.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-noreply@aistaffglobal.com}
      SMTP_USER:     ${SMTP_USER:-}
      SMTP_PASS:     ${SMTP_PASS:-}
      # Aliases used by notification_service — forward both so actions.ts can
      # fall back to whichever naming convention is set in Dokploy.
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # Direct DB access — used by Next.js API routes that query postgres via pg Pool
      # (e.g. /api/reputation/*/export, /api/transparency/missed-jobs, /api/proposals/submit)
      DATABASE_URL: postgres://${POSTGRES_USER:-aistaff}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aistaff}
      # Uploaded listing images — /tmp is always writable, no volume config needed.
      # For persistence across restarts, set LISTING_IMAGES_DIR to a mounted path
      # and add a named volume in Dokploy UI.
      LISTING_IMAGES_DIR: /tmp/listing-images
      # Backend service URLs — Docker container names
      IDENTITY_SERVICE_URL:     http://identity-service:3001
      MARKETPLACE_SERVICE_URL:  http://marketplace-service:3002
      CHECKLIST_SERVICE_URL:    http://checklist-service:3003
      LICENSE_SERVICE_URL:      http://license-service:3004
      MATCHING_SERVICE_URL:     http://matching-service:3005
      COMPLIANCE_SERVICE_URL:   http://compliance-service:3006
      TELEMETRY_SERVICE_URL:    http://telemetry-service:3007
      ANALYTICS_SERVICE_URL:    http://analytics-service:3008
      REPUTATION_SERVICE_URL:   http://reputation-service:3009
      PAYOUT_SERVICE_URL:       http://payout-service:3010
      COMMUNITY_SERVICE_URL:    http://community-service:3011
      NOTIFICATION_SERVICE_URL: http://notification-service:3012
    # No host port binding — Traefik (Dokploy) routes via container network.
    # For local dev, use docker-compose.override.yml which re-adds 3000:3000.
    expose:
      - "3000"
    depends_on:
      postgres: { condition: service_healthy }
      identity-service:   { condition: service_started }
      marketplace-service: { condition: service_started }
      checklist-service:  { condition: service_started }
      payout-service:     { condition: service_started }

volumes:
  pg_data:
  qdrant_data:
  # listing_images: # uncomment + add volume mount to web service for persistent image storage
