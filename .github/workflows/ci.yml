# CI — AiStaffApp
# Enforces all 11 audit gates defined in CLAUDE.md §5 before merge.
#
# Jobs run in parallel; any failure blocks merge.
# Rust builds reuse a cargo layer cache keyed on Cargo.lock.

name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  RUST_BACKTRACE: 1

# ── Gate 3: Formatting ─────────────────────────────────────────────────────────
jobs:
  fmt:
    name: "Gate 3 — rustfmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

# ── Gate 2: Clippy ─────────────────────────────────────────────────────────────
  clippy:
    name: "Gate 2 — clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: clippy
      - name: Install rdkafka build deps
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

# ── Gate 1: cargo audit ────────────────────────────────────────────────────────
  audit:
    name: "Gate 1 — cargo audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # .cargo/audit.toml is read automatically; exits 0 when only ignored advisories remain
      - run: cargo audit

# ── Gate 1b: cargo deny ────────────────────────────────────────────────────────
  deny:
    name: "Gate 1b — cargo deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

# ── Gates 10 + 11: Secrets scan + CRLF ────────────────────────────────────────
  scan:
    name: "Gates 10+11 — secrets + CRLF"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Gate 11: No CRLF in repo"
        run: |
          crlf=$(git ls-files --eol | grep crlf) || true
          if [ -n "$crlf" ]; then
            echo "❌ CRLF line endings found:"
            echo "$crlf"
            exit 1
          fi
          echo "✓ No CRLF"

      - name: "Gate 10: No PEM private keys in source"
        run: |
          if git grep -rn "-----BEGIN" -- \
              ':!*.md' ':!docs/' ':!.cargo/audit.toml' ':!deny.toml'; then
            echo "❌ PEM data found in source"
            exit 1
          fi
          echo "✓ No PEM data"

      - name: "Gate 10: No hardcoded password literals"
        run: |
          if git grep -Prn 'password\s*=\s*"[^"]+"' -- \
              ':!*.md' ':!*.sql' ':!Cargo.lock' ':!docs/' ':!.github/'; then
            echo "❌ Hardcoded password literal found"
            exit 1
          fi
          echo "✓ No hardcoded passwords"

# ── Gate 9: Frontend — ESLint + Next.js build ─────────────────────────────────
  frontend:
    name: "Gate 9 — ESLint + Next.js build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Build (catches TypeScript + missing imports)
        run: npm run build
        env:
          # Silence Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1
          # Auth.js v5 requires NEXTAUTH_SECRET at build time (not used, just must be set)
          NEXTAUTH_SECRET: ci-build-placeholder
          # Service URLs default to localhost:300x — fine for type-checking; not used at build
          IDENTITY_SERVICE_URL: http://localhost:3001
          MARKETPLACE_SERVICE_URL: http://localhost:3002

# ── Gates 5–8: Rust tests (unit + integration) ────────────────────────────────
  test:
    name: "Gates 5–8 — cargo test"
    runs-on: ubuntu-latest   # Docker is pre-installed; testcontainers uses it for Postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - name: Install rdkafka build deps
        run: sudo apt-get update -qq && sudo apt-get install -y cmake libssl-dev pkg-config
      - uses: Swatinem/rust-cache@v2

      - name: "Library + unit tests (all workspace crates)"
        run: cargo test --workspace --lib

      - name: "Integration tests — community_service (testcontainers Postgres)"
        run: cargo test -p community_service
        # testcontainers pulls postgres:16 and spins it up via the Docker daemon.
        # Kafka emit_event calls log a warning and no-op (no broker in CI).

# ── Required status checks summary ────────────────────────────────────────────
# All jobs must pass before merge is allowed.
# Configure in GitHub: Settings → Branches → Require status checks:
#   Gate 3 — rustfmt
#   Gate 2 — clippy
#   Gate 1 — cargo audit
#   Gate 1b — cargo deny
#   Gates 10+11 — secrets + CRLF
#   Gate 9 — ESLint + Next.js build
#   Gates 5–8 — cargo test
