# cargo-audit configuration
# See: https://docs.rs/cargo-audit/latest/cargo_audit/config/
#
# Only HIGH and CRITICAL advisories block the release (CLAUDE.md §3).
# Medium and below are assessed case-by-case and recorded here with rationale.

[advisories]
ignore = [
    # MEDIUM (5.9): Marvin timing side-channel in `rsa` crate.
    # Pulled transitively by sqlx-mysql (we use Postgres only; no RSA decrypt path).
    # No upstream fix available. Mitigated by server-side-only RS256 key usage.
    "RUSTSEC-2023-0071",

    # tokio-tar PAX header file-smuggling.
    # Pulled exclusively by `testcontainers` which is a DEV-only dependency
    # (community_service integration tests). No production binary uses tokio-tar.
    # No upstream fix available.
    "RUSTSEC-2025-0111",
]
